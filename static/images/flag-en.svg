<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" width="28" height="18">
  <rect width="60" height="30" fill="#012169"/>
  <!-- St Andrew (white X) -->
  <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
  <!-- St Patrick (red X, offset) -->
  <path d="M0,0 L60,30" stroke="#C8102E" stroke-width="4"/>
  <path d="M60,0 L0,30" stroke="#C8102E" stroke-width="4"/>
  <!-- St George (white cross) -->
  <rect x="0" y="12" width="60" height="6" fill="#fff"/>
  <rect x="27" y="0" width="6" height="30" fill="#fff"/>
  <!-- St George (red cross) -->
  <rect x="0" y="13" width="60" height="4" fill="#C8102E"/>
  <rect x="28" y="0" width="4" height="30" fill="#C8102E"/>
</svg>
